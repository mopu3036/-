<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像生成プロンプト辞典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #10101a;
    --bg3: #16162a;
    --card: #1a1a2e;
    --card-hover: #1f1f3a;
    --border: rgba(120, 100, 255, 0.2);
    --border-hover: rgba(120, 100, 255, 0.5);
    --accent: #7b5cfa;
    --accent2: #e040fb;
    --accent3: #00e5ff;
    --accent4: #ff6b6b;
    --text: #e8e8f0;
    --text2: #9090b8;
    --text3: #5f5f8f;
    --tag-bg: rgba(123, 92, 250, 0.12);
    --glow: 0 0 30px rgba(123, 92, 250, 0.15);
    --glow-strong: 0 0 50px rgba(123, 92, 250, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ノイズテクスチャ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* メッシュグラデーション背景 */
  .mesh-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .mesh-bg::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(123,92,250,0.08) 0%, transparent 70%);
    top: -200px; left: -200px;
    animation: drift1 20s ease-in-out infinite;
  }
  .mesh-bg::after {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(224,64,251,0.06) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: drift2 25s ease-in-out infinite;
  }
  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,60px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-80px)} }

  /* ヘッダー */
  header {
    position: relative;
    z-index: 10;
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(10,10,15,0.98) 0%, rgba(10,10,15,0.8) 100%);
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }

  .logo-area { flex: 1; min-width: 280px; }

  .logo-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 800;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, #c8b8ff 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .stat-divider { width: 1px; height: 40px; background: var(--border); }

  /* コントロールバー */
  .controls {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
  }

  .controls-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 240px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 15px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(123,92,250,0.15);
  }
  .search-input::placeholder { color: var(--text3); }

  .sort-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .sort-select:focus { border-color: var(--accent); }

  .shuffle-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, rgba(123,92,250,0.2), rgba(224,64,251,0.15));
    border: 1px solid rgba(123,92,250,0.4);
    border-radius: 10px;
    padding: 10px 16px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .shuffle-btn:hover {
    background: linear-gradient(135deg, rgba(123,92,250,0.4), rgba(224,64,251,0.3));
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(123,92,250,0.3);
    transform: translateY(-1px);
  }
  .shuffle-btn .shuffle-icon {
    display: inline-block;
    font-size: 15px;
    transition: transform 0.5s ease;
  }
  .shuffle-btn:hover .shuffle-icon { transform: rotate(180deg); }

  /* シャッフルモーダル */
  .shuffle-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .shuffle-overlay.show { opacity: 1; pointer-events: all; }

  .shuffle-modal {
    background: var(--bg2);
    border: 1px solid var(--border-hover);
    border-radius: 20px;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 0 80px rgba(123,92,250,0.25);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .shuffle-overlay.show .shuffle-modal { transform: translateY(0) scale(1); }

  .shuffle-modal-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    background: var(--bg2);
    border-radius: 20px 20px 0 0;
    z-index: 1;
  }
  .shuffle-modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #c8b8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .shuffle-modal-close {
    width: 32px; height: 32px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text3);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .shuffle-modal-close:hover { background: var(--accent4); border-color: var(--accent4); color: white; }

  .shuffle-modal-controls {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .shuffle-count-label {
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
  }
  .shuffle-count-input {
    width: 64px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    text-align: center;
    outline: none;
  }
  .shuffle-count-input:focus { border-color: var(--accent); }

  .shuffle-genre-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .shuffle-genre-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .shuffle-genre-chip.active {
    background: var(--tag-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  .shuffle-reroll-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 9px 18px;
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .shuffle-reroll-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .shuffle-reroll-btn .spin { display: inline-block; }
  .shuffle-reroll-btn.spinning .spin { animation: spinOnce 0.4s ease; }
  @keyframes spinOnce { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .shuffle-modal-body { padding: 20px 24px; }

  .shuffle-result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .shuffle-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    animation: shuffleIn 0.3s ease backwards;
    position: relative;
  }
  @keyframes shuffleIn {
    from { opacity:0; transform: translateY(10px) rotate(-1deg); }
    to   { opacity:1; transform: translateY(0) rotate(0); }
  }
  .shuffle-card-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .shuffle-card-jp {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .shuffle-card-actions {
    display: flex;
    gap: 6px;
  }
  .shuffle-card-add {
    flex: 1;
    background: var(--tag-bg);
    border: 1px solid rgba(123,92,250,0.3);
    border-radius: 7px;
    color: var(--accent);
    font-size: 12px;
    padding: 5px 0;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .shuffle-card-add:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .shuffle-card-add.added { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }

  .shuffle-card-copy {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text3);
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shuffle-card-copy:hover { background: var(--accent); border-color: var(--accent); color: white; }

  .shuffle-modal-footer {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .shuffle-all-add {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 11px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shuffle-all-add:hover { opacity: 0.85; transform: translateY(-1px); }
  .shuffle-all-copy {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 11px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shuffle-all-copy:hover { border-color: var(--accent); color: var(--accent); }

  /* シャッフルタブ */
  .shuffle-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 4px;
  }
  .shuffle-tab {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 8px 10px;
    color: var(--text3);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    margin-bottom: -1px;
  }
  .shuffle-tab:hover { color: var(--text2); }
  .shuffle-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .shuffle-tab-desc {
    font-size: 10px;
    font-weight: 400;
    color: var(--text3);
    letter-spacing: 0.02em;
  }
  .shuffle-tab.active .shuffle-tab-desc { color: rgba(123,92,250,0.7); }

  /* ジャンル別モードのジャンル選択グリッド */
  .shuffle-genre-select-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    width: 100%;
  }
  .shuffle-genre-select-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 5px 11px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .shuffle-genre-select-chip.active {
    background: var(--tag-bg);
    border-color: var(--accent);
    color: var(--accent);
  }
  .shuffle-genre-select-chip .chip-check {
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .shuffle-genre-select-chip.active .chip-check { opacity: 1; }

  /* ジャンル別結果 */
  .per-genre-section {
    margin-bottom: 20px;
    animation: shuffleIn 0.3s ease backwards;
  }
  .per-genre-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .per-genre-label-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }
  .per-genre-reroll {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text3);
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }
  .per-genre-reroll:hover { border-color: var(--accent); color: var(--accent); }
  .per-genre-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .per-genre-card-info { flex: 1; }
  .per-genre-card-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .per-genre-card-jp { font-size: 12px; color: var(--text2); }
  .per-genre-card-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .per-genre-add {
    background: var(--tag-bg);
    border: 1px solid rgba(123,92,250,0.3);
    border-radius: 6px;
    color: var(--accent);
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .per-genre-add:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .per-genre-add.added { background: rgba(34,197,94,0.15); border-color: #22c55e; color: #22c55e; }
  .per-genre-copy {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text3);
    font-size: 11px;
    padding: 5px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .per-genre-copy:hover { background: var(--accent); border-color: var(--accent); color: white; }

  /* ジャンルタブ */
  .genre-bar {
    position: relative;
    z-index: 10;
    padding: 16px 40px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .genre-bar::-webkit-scrollbar { display: none; }

  .genre-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
  }

  .genre-btn {
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 16px;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .genre-btn .genre-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.2s;
  }
  .genre-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .genre-btn.active {
    background: var(--tag-bg);
    border-color: var(--accent);
    color: var(--accent);
  }
  .genre-btn.active .genre-dot { background: var(--accent); }

  /* メインコンテンツ */
  .main {
    position: relative;
    z-index: 5;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 40px 60px;
  }

  /* 結果カウント */
  .result-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .result-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }
  .result-count span { color: var(--accent); font-weight: 600; }

  .view-toggle {
    display: flex;
    gap: 4px;
  }
  .view-btn {
    width: 32px; height: 32px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    transition: all 0.2s;
    font-size: 14px;
  }
  .view-btn.active, .view-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* グリッド */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .grid.list-view {
    grid-template-columns: 1fr;
  }

  /* カード */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease backwards;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(123,92,250,0.04) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: var(--glow);
  }
  .card:hover::before { opacity: 1; }

  @keyframes fadeIn {

  { tag:'swimsuit', jp:'水着', genre:'outfit', strength:3, desc:'ビーチ・プール向けの水着スタイル。' },
  { tag:'hoodie', jp:'パーカー', genre:'outfit', strength:2, desc:'ジップアップまたはプルオーバーのカジュアルなパーカー。' },
  { tag:'off-shoulder dress', jp:'オフショルダードレス', genre:'outfit', strength:3, desc:'肩を露出したエレガントなオフショルダーのドレス。' },
  { tag:'trench coat', jp:'トレンチコート', genre:'outfit', strength:3, desc:'ベルト付きの長めのトレンチコート。知的な印象を与える。' },
  { tag:'fur coat', jp:'ファーコート', genre:'outfit', strength:4, desc:'ふわふわした毛皮素材のゴージャスなコート。' },
  { tag:'yukata', jp:'浴衣', genre:'outfit', strength:4, desc:'夏祭り・花火大会などに着る軽やかな浴衣スタイル。' },
];

// 状態
let activeGenre = 'all';
let searchQuery = '';
let sortKey = 'default';
let isListView = false;

// 初期化
function init() {
  document.getElementById('totalCount').textContent = DATA.length;
  document.getElementById('genreCount').textContent = Object.keys(GENRES).length;
  buildGenreBar();
  render();
}

function buildGenreBar() {
  const bar = document.getElementById('genreBar');
  bar.innerHTML = '';

  const all = document.createElement('button');
  all.className = 'genre-btn active';
  all.dataset.genre = 'all';
  all.innerHTML = `<span class="genre-dot"></span> すべて (${DATA.length})`;
  all.onclick = () => setGenre('all');
  bar.appendChild(all);

  for (const [key, g] of Object.entries(GENRES)) {
    const count = DATA.filter(d => d.genre === key).length;
    const btn = document.createElement('button');
    btn.className = 'genre-btn';
    btn.dataset.genre = key;
    btn.innerHTML = `<span class="genre-dot"></span> ${g.icon} ${g.label} (${count})`;
    btn.onclick = () => setGenre(key);
    bar.appendChild(btn);
  }
}

function setGenre(genre) {
  activeGenre = genre;
  document.querySelectorAll('.genre-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.genre === genre);
  });
  render();
}

function getFiltered() {
  let d = [...DATA];
  if (activeGenre !== 'all') d = d.filter(x => x.genre === activeGenre);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    d = d.filter(x =>
      x.tag.toLowerCase().includes(q) ||
      x.jp.includes(q) ||
      (x.desc && x.desc.includes(q))
    );
  }
  switch (sortKey) {
    case 'az': d.sort((a, b) => a.tag.localeCompare(b.tag)); break;
    case 'za': d.sort((a, b) => b.tag.localeCompare(a.tag)); break;
    case 'jp': d.sort((a, b) => a.jp.localeCompare(b.jp, 'ja')); break;
    case 'strength': d.sort((a, b) => b.strength - a.strength); break;
    case 'genre': d.sort((a, b) => a.genre.localeCompare(b.genre)); break;
  }
  return d;
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('resultNum').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">⊘</div><div class="empty-text">該当するタグが見つかりませんでした</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map((d, i) => {
    const g = GENRES[d.genre];
    const strCls = d.strength >= 4 ? 'str-high' : d.strength >= 3 ? 'str-mid' : 'str-low';
    const strW = (d.strength / 5 * 100) + '%';
    const delay = Math.min(i * 30, 300);
    const inList = myList.includes(d.tag);
    const safeTag = d.tag.replace(/'/g, "\\'");
    return `
    <div class="card" style="animation-delay:${delay}ms">
      <div class="card-top">
        <span class="genre-badge ${g.cls}">${g.icon} ${g.label}</span>
        <div class="card-buttons">
          <button class="add-btn${inList?' added':''}" title="マイリストに追加" onclick="toggleMylist(event,'${safeTag}')">${inList?'✓':'+'}</button>
          <button class="copy-btn" onclick="copyTag(event, '${safeTag}')">⎘</button>
        </div>
      </div>
      <div class="card-tag">${d.tag}</div>
      <div class="card-jp">${d.jp}</div>
      ${d.desc ? `<div class="card-desc">${d.desc}</div>` : ''}
      <div class="card-meta">
        <span class="strength-label">効果 ${d.strength}/5</span>
        <div class="strength-bar"><div class="strength-fill ${strCls}" style="width:${strW}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function copyTag(e, tag) {
  e.stopPropagation();
  navigator.clipboard.writeText(tag).then(() => {
    const btn = e.currentTarget;
    btn.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⎘'; }, 1500);

    const toast = document.getElementById('toast');
    toast.innerHTML = `✓ コピー: <strong>${tag}</strong>`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

// イベント
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortKey = e.target.value;
  render();
});

document.getElementById('gridViewBtn').addEventListener('click', () => {
  isListView = false;
  document.getElementById('grid').classList.remove('list-view');
  document.getElementById('gridViewBtn').classList.add('active');
  document.getElementById('listViewBtn').classList.remove('active');
});

document.getElementById('listViewBtn').addEventListener('click', () => {
  isListView = true;
  document.getElementById('grid').classList.add('list-view');
  document.getElementById('listViewBtn').classList.add('active');
  document.getElementById('gridViewBtn').classList.remove('active');
});

// ─── マイリスト ───
let myList = [];

function toggleMylist(e, tag) {
  e.stopPropagation();
  const idx = myList.indexOf(tag);
  if (idx === -1) {
    myList.push(tag);
  } else {
    myList.splice(idx, 1);
  }
  renderMylist();
  render();
  // パネルを開く（追加時）
  if (idx === -1) {
    const panel = document.getElementById('mylistPanel');
    if (!panel.classList.contains('open')) {
      panel.classList.add('open');
    }
  }
}

function renderMylist() {
  const badge = document.getElementById('mylistBadge');
  const empty = document.getElementById('mylistEmpty');
  const tagsEl = document.getElementById('mylistTags');
  const promptBox = document.getElementById('mylistPromptBox');

  badge.textContent = myList.length;
  // バンプアニメ
  badge.classList.remove('bump');
  void badge.offsetWidth;
  badge.classList.add('bump');
  setTimeout(() => badge.classList.remove('bump'), 300);

  if (myList.length === 0) {
    empty.style.display = 'block';
    tagsEl.style.display = 'none';
    promptBox.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  tagsEl.style.display = 'flex';
  promptBox.style.display = 'block';

  // プロンプトプレビュー
  promptBox.innerHTML = myList.map((t, i) =>
    `<span class="prompt-tag">${t}</span>${i < myList.length-1 ? '<span class="prompt-comma">, </span>' : ''}`
  ).join('');

  // チップ
  tagsEl.innerHTML = myList.map(t => `
    <div class="mylist-tag-chip">
      <span>${t}</span>
      <button class="chip-remove" onclick="removeFromMylist('${t.replace(/'/g,"\\'")}')">×</button>
    </div>
  `).join('');
}

function removeFromMylist(tag) {
  myList = myList.filter(t => t !== tag);
  renderMylist();
  render();
}

function clearMylist(e) {
  e.stopPropagation();
  if (myList.length === 0) return;
  myList = [];
  renderMylist();
  render();
}

function copyAllTags(e) {
  e.stopPropagation();
  if (myList.length === 0) return;
  const text = myList.join(', ');
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.innerHTML = `✓ ${myList.length}件のタグをコピーしました`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });
}

// パネル開閉
document.getElementById('mylistHandle').addEventListener('click', () => {
  document.getElementById('mylistPanel').classList.toggle('open');
});

// ページ下部のパディング調整（パネルが被らないように）
function adjustBodyPadding() {
  document.querySelector('.main').style.paddingBottom =
    document.getElementById('mylistPanel').classList.contains('open') ? '300px' : '80px';
}
document.getElementById('mylistHandle').addEventListener('click', () => {
  setTimeout(adjustBodyPadding, 360);
});

// ─── シャッフル ───
let shuffleResults = [];
let shuffleGenreFilter = 'all';
let shuffleTab = 'free'; // 'free' | 'perGenre'
let selectedGenres = new Set(Object.keys(GENRES)); // ジャンル別モードの選択ジャンル
let perGenreResults = {}; // { genre: tagObject }

function setShuffleTab(tab) {
  shuffleTab = tab;
  document.getElementById('tabFree').classList.toggle('active', tab === 'free');
  document.getElementById('tabPerGenre').classList.toggle('active', tab === 'perGenre');
  document.getElementById('shuffleFreePanel').style.display = tab === 'free' ? '' : 'none';
  document.getElementById('shufflePerGenrePanel').style.display = tab === 'perGenre' ? '' : 'none';
  if (tab === 'perGenre') doPerGenreShuffle();
}

function openShuffle() {
  buildShuffleGenreFilter();
  buildShuffleGenreSelectGrid();
  doShuffle();
  document.getElementById('shuffleOverlay').classList.add('show');
}

function closeShuffle() {
  document.getElementById('shuffleOverlay').classList.remove('show');
}

function buildShuffleGenreFilter() {
  const el = document.getElementById('shuffleGenreFilter');
  el.innerHTML = `<span class="shuffle-genre-chip active" data-g="all" onclick="setShuffleGenre('all')">すべて</span>` +
    Object.entries(GENRES).map(([key, g]) =>
      `<span class="shuffle-genre-chip" data-g="${key}" onclick="setShuffleGenre('${key}')">${g.icon} ${g.label}</span>`
    ).join('');
}

function buildShuffleGenreSelectGrid() {
  const el = document.getElementById('shuffleGenreSelectGrid');
  el.innerHTML = Object.entries(GENRES).map(([key, g]) => {
    const isActive = selectedGenres.has(key);
    return `<span class="shuffle-genre-select-chip ${isActive?'active':''}" data-g="${key}" onclick="toggleGenreSelect('${key}')">
      <span class="chip-check">✓</span>${g.icon} ${g.label}
    </span>`;
  }).join('');
}

function toggleGenreSelect(genre) {
  if (selectedGenres.has(genre)) {
    if (selectedGenres.size > 1) selectedGenres.delete(genre); // 最低1つは残す
  } else {
    selectedGenres.add(genre);
  }
  document.querySelectorAll('.shuffle-genre-select-chip').forEach(c => {
    c.classList.toggle('active', selectedGenres.has(c.dataset.g));
  });
  doPerGenreShuffle();
}

function setShuffleGenre(genre) {
  shuffleGenreFilter = genre;
  document.querySelectorAll('.shuffle-genre-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.g === genre);
  });
  doShuffle();
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// フリーモード
function doShuffle() {
  const count = Math.min(Math.max(parseInt(document.getElementById('shuffleCountInput').value) || 5, 1), 20);
  let pool = [...DATA];
  if (shuffleGenreFilter !== 'all') pool = pool.filter(d => d.genre === shuffleGenreFilter);
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  shuffleResults = pool.slice(0, count);
  renderShuffleResults();
  const btn = document.getElementById('shuffleRerollBtn');
  btn.classList.remove('spinning'); void btn.offsetWidth; btn.classList.add('spinning');
}

function renderShuffleResults() {
  const grid = document.getElementById('shuffleResultGrid');
  grid.innerHTML = shuffleResults.map((d, i) => {
    const g = GENRES[d.genre];
    const inList = myList.includes(d.tag);
    const safeTag = d.tag.replace(/'/g, "\\'");
    return `
    <div class="shuffle-card" style="animation-delay:${i * 50}ms">
      <span class="genre-badge ${g.cls}" style="font-size:10px;margin-bottom:8px;display:inline-block">${g.icon} ${g.label}</span>
      <div class="shuffle-card-tag">${d.tag}</div>
      <div class="shuffle-card-jp">${d.jp}</div>
      <div class="shuffle-card-actions">
        <button class="shuffle-card-add${inList?' added':''}" onclick="shuffleToggleMylist(this,'${safeTag}')">
          ${inList ? '✓ 追加済み' : '＋ マイリストへ'}
        </button>
        <button class="shuffle-card-copy" onclick="shuffleCopyOne(event,'${safeTag}')">⎘</button>
      </div>
    </div>`;
  }).join('');
}

// ジャンル別モード
function doPerGenreShuffle() {
  perGenreResults = {};
  selectedGenres.forEach(genre => {
    const pool = DATA.filter(d => d.genre === genre);
    if (pool.length > 0) perGenreResults[genre] = pickRandom(pool);
  });
  renderPerGenreResults();
  const btn = document.getElementById('shufflePerGenreRerollBtn');
  btn.classList.remove('spinning'); void btn.offsetWidth; btn.classList.add('spinning');
}

function rerollOneGenre(genre) {
  const pool = DATA.filter(d => d.genre === genre);
  if (pool.length > 0) perGenreResults[genre] = pickRandom(pool);
  renderPerGenreResults();
}

function renderPerGenreResults() {
  const el = document.getElementById('shufflePerGenreResult');
  el.innerHTML = Object.entries(perGenreResults).map(([genre, d], i) => {
    const g = GENRES[genre];
    const inList = myList.includes(d.tag);
    const safeTag = d.tag.replace(/'/g, "\\'");
    return `
    <div class="per-genre-section" style="animation-delay:${i*40}ms">
      <div class="per-genre-label">
        <span class="per-genre-label-badge ${g.cls}">${g.icon} ${g.label}</span>
        <button class="per-genre-reroll" onclick="rerollOneGenre('${genre}')">⟳ 引き直し</button>
      </div>
      <div class="per-genre-card">
        <div class="per-genre-card-info">
          <div class="per-genre-card-tag">${d.tag}</div>
          <div class="per-genre-card-jp">${d.jp}</div>
        </div>
        <div class="per-genre-card-btns">
          <button class="per-genre-add${inList?' added':''}" onclick="perGenreToggleMylist(this,'${safeTag}')">
            ${inList?'✓':'＋'}
          </button>
          <button class="per-genre-copy" onclick="shuffleCopyOne(event,'${safeTag}')">⎘</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function perGenreToggleMylist(btn, tag) {
  const idx = myList.indexOf(tag);
  if (idx === -1) { myList.push(tag); btn.classList.add('added'); btn.textContent = '✓'; }
  else { myList.splice(idx, 1); btn.classList.remove('added'); btn.textContent = '＋'; }
  renderMylist(); render();
}

function shuffleToggleMylist(btn, tag) {
  const idx = myList.indexOf(tag);
  if (idx === -1) { myList.push(tag); btn.classList.add('added'); btn.textContent = '✓ 追加済み'; }
  else { myList.splice(idx, 1); btn.classList.remove('added'); btn.textContent = '＋ マイリストへ'; }
  renderMylist(); render();
}

function shuffleCopyOne(e, tag) {
  e.stopPropagation();
  navigator.clipboard.writeText(tag).then(() => {
    const toast = document.getElementById('toast');
    toast.innerHTML = `✓ コピー: <strong>${tag}</strong>`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

document.getElementById('shuffleOpenBtn').addEventListener('click', openShuffle);
document.getElementById('shuffleCloseBtn').addEventListener('click', closeShuffle);
document.getElementById('shuffleOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('shuffleOverlay')) closeShuffle();
});
document.getElementById('shuffleRerollBtn').addEventListener('click', doShuffle);
document.getElementById('shuffleCountInput').addEventListener('change', doShuffle);
document.getElementById('shufflePerGenreRerollBtn').addEventListener('click', doPerGenreShuffle);

document.getElementById('shuffleAllAddBtn').addEventListener('click', () => {
  const targets = shuffleTab === 'free'
    ? shuffleResults
    : Object.values(perGenreResults);
  targets.forEach(d => { if (!myList.includes(d.tag)) myList.push(d.tag); });
  renderMylist();
  if (shuffleTab === 'free') renderShuffleResults();
  else renderPerGenreResults();
  render();
  const toast = document.getElementById('toast');
  toast.innerHTML = `✓ ${targets.length}件をマイリストに追加しました`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
});

document.getElementById('shuffleAllCopyBtn').addEventListener('click', () => {
  const targets = shuffleTab === 'free'
    ? shuffleResults
    : Object.values(perGenreResults);
  const text = targets.map(d => d.tag).join(', ');
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.innerHTML = `✓ ${targets.length}件のタグをコピーしました`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeShuffle();
});

init();
</script>
